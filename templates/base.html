<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>{{ title }}</title>

        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Ubuntu,
                    Cantarell,
                    "Noto Sans",
                    sans-serif;
                max-width: 700px;
                margin: 0 auto;
                padding: 20px;
                font-size: 18px;
                line-height: 1.7;
            }

            a {
                color: #0366d6;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            code,
            pre {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    "Liberation Mono", "Courier New", monospace;
            }

            .posts {
                list-style: none;
                padding: 0;
            }

            .posts li {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                padding: 6px 0;
            }

            .posts .date {
                color: #777;
                font-size: 0.9em;
                white-space: nowrap;
            }
            main {
                font-size: 1.05rem;
            }

            main h1,
            main h2,
            main h3 {
                margin-top: 1.5em;
            }

            main p {
                margin: 1em 0;
            }
            header {
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }

            footer {
                margin-top: 20px;
                padding-top: 10px;
                border-top: 1px solid #eee;
            }

            nav a {
                margin-right: 10px;
                text-decoration: none;
                color: blue;
            }
        </style>
    </head>

    <body>
        <header class="nav">
            <span class="name">mukul:~</span>

            <a href="/">home</a>
            <span>/</span>
            <a href="/blog/">blog</a>
            <span>/</span>
            <a href="/about-me">about</a>
            <span>/</span>
            <span class="current">{{ title }}</span>
        </header>

        <main>{{ content }}</main>
    </body>
</html>
