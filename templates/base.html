<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ title }}</title>

    <link rel="canonical" href="{{ canonical_url }}">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/rss.xml">

    <style>
        * {
            box-sizing: border-box;

        }

        html {
            overflow-y: scroll;
        }

        body {
            margin: 0;
            padding: 2rem;
            background: #f7f7f7;
            color: #222;
            font: 18px/1.7 Georgia, "Times New Roman", serif;

        }

        .page {
            max-width: 860px;
            margin: auto;
            background: #fff;
            border: 2px solid #222;
            padding: 2.5rem;
            min-height: calc(100vh - 4rem);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .site-title {
            font-size: 2rem;
            font-weight: bold;
            color: inherit;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        nav a {
            color: #666;
            text-decoration: none;
        }

        nav a:hover {
            color: #000;
            text-decoration: underline;
        }

        hr {
            border: 0;
            border-top: 1px solid #222;
            margin: 2rem 0;
        }

        main {
            min-height: 60vh;
        }

        h1,
        h2,
        h3 {
            line-height: 1.3;
            margin-top: 2rem;
            margin-bottom: .75rem;
        }

        p {
            margin: 1rem 0;
        }

        a {
            color: inherit;
        }

        img {
            max-width: 100%;
        }

        pre {
            overflow-x: auto;
            border: 1px solid #222;
            padding: 1rem;
        }

        code {
            font-family: Consolas, monospace;
            font-size: .9rem;
        }

        blockquote {
            margin: 1rem 0;
            padding-left: 1rem;
            border-left: 3px solid #222;
            color: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #222;
            padding: .5rem;
            text-align: left;
        }

        /* Blog archive */

        .posts {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .posts li {
            display: grid;
            grid-template-columns: 10ch auto 1fr;
            gap: .75rem;
            align-items: baseline;
            margin: .8rem 0;
        }

        .date {
            color: #666;
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .sep {
            color: #666;
        }

        .posts a {
            text-decoration: none;
        }

        .posts a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 3rem;
            color: #666;
            font-size: .95rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }

            .page {
                padding: 1.5rem;
            }

            header {
                display: block;
            }

            nav {
                margin-top: .75rem;
            }

            .posts li {
                grid-template-columns: 1fr;
                gap: .2rem;
            }

            .date {
                text-align: left;
            }

            .sep {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <header>
            <a href="/" class="site-title">Mukul Makwana</a>

            <nav>
                <a href="/about/">About</a>
                <a href="/tags/">Tags</a>
                <a href="https://github.com/mukul0x9">GitHub</a>
                <a href="/rss.xml">RSS</a>
            </nav>
        </header>

        <hr>

        <main>
            {{ content }}
        </main>

    </div>

    {{ dev_script }}


</body>

</html>
