<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ title }}</title>

<style>
:root {
    --bg: #ffffff;
    --text: #222222;
    --muted: #666666;
    --border: #dddddd;
    --link:#0066cc;
}

[data-theme="dark"] {
    --bg: #0f1115;
    --text: #e8e8e8;
    --muted: #9aa0a6;
    --border: #2a2f36;
    --link: lightskyblue;
}

body {
    margin: 40px auto;
    max-width: 750px;
    padding: 0 16px;
    font: 19px/1.7 Georgia, serif;
    color: var(--text);
    background: var(--bg);
}

/* header */
header {
    margin-bottom: 3rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
}

header a {
    text-decoration: none;
    color: inherit;
}

nav {
    font-size: 1.3rem;
    color: var(--muted);
}

nav a {
    margin-right: 12px;
}

/* toggle button */
.toggle {
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--muted);
    border: none;
    background: none;
}

/* content */
h1, h2, h3 {
    line-height: 1.3;
    margin: 2rem 0 1rem;
}

p {
    margin: 1rem 0;
}

a {
    color: var(--link);
    text-decoration: underline;
}

blockquote {
    margin: 1.5rem 0;
    padding-left: 1rem;
    border-left: 2px solid var(--border);
    color: var(--muted);
    font-style: italic;
}

img {
    max-width: 100%;
    display: block;
    margin: 1.5rem 0;
}

/* posts list */
.posts {
    list-style: none;
    padding: 0;
}

.posts li {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 0.5rem 0;
    padding: 2px 0;

}


.date {
    color: var(--muted);
    font-size: 0.9rem;
    white-space: nowrap;
    min-width: 110px; /* keeps dates aligned vertically */
}

.posts a {
    text-decoration: none;
}
.toggle{
    background-color: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div>
        <a href="/"><strong>Mukul Makwana</strong></a>
        <nav>
            <a href="/">Home</a>
            <a href="/blog/">Blog</a>
            <a href="/about-me">About</a>
        </nav>
    </div>
    <button class="toggle" onclick="toggleTheme()">dark</button>
</header>

<main>
    {{ content }}
</main>

<script>
function setTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);

    const btn = document.querySelector(".toggle");
    btn.textContent = theme === "dark" ? "light" : "dark";
}

function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    const next = current === "dark" ? "light" : "dark";
    setTheme(next);
}

// load saved theme
(function () {
    const saved = localStorage.getItem("theme") || "light";
    setTheme(saved);
})();
</script>

</body>
</html>
