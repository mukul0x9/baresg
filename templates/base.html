<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>

        <style>
            body {
                font:
                    19px/1.7 Georgia,
                    serif;
                background-color: #f6f6f6;
            }
            section {
                max-width: 750px;
                min-height: 900px;
                padding: 40px 100px;
                margin: 0 auto;
                background-color: white;
                box-shadow: 0px 5px 10px 0px rgba(0, 0, 0, 0.5);
            }
            header {
                margin-bottom: 2rem;
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            nav a {
                margin-right: 12px;
            }

            h1,
            h2,
            h3 {
                line-height: 1.3;
                margin: 2rem 0 1rem;
            }

            p {
                margin: 1rem 0;
            }

            .posts {
                list-style: none;
                padding: 0;
            }

            .posts li {
                display: flex;
                align-items: baseline;
                gap: 12px;
                margin: 0.5rem 0;
                padding: 2px 0;
            }

            .date {
                color: #666666;
                font-size: 0.9rem;
                white-space: nowrap;
                min-width: 110px;
            }
            .alltags {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                list-style: none;
                padding: 0;
                margin: 10px 0;
            }
            .alltags a {
                display: inline-block;
                text-decoration: none;
                padding: 4px;
                /*border: 1px solid #ccc;*/
                background-color: #f0f0f0;
                /*border-radius: 10px;*/
                font-size: 14px;
            }

            @media (max-width: 640px) {
                section {
                    padding: 24px 20px;
                }

                .posts li {
                    flex-direction: column;
                    gap: 2px;
                }

                .date {
                    min-width: auto;
                    font-size: 0.8rem;
                }

                nav {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;
                }

                nav h2 {
                    width: 100%;
                    margin-bottom: 6px;
                }
            }
        </style>
    </head>

    <body>
        <section class="container wrap">
            <header>
                <div class="nav">
                    <nav>
                        <h2>Mukul Makwana</h2>
                        <a href="/">Home</a>
                        <a href="/blog/">Blog</a>

                        <!--<a href="/about-me">About</a>-->
                    </nav>
                </div>
            </header>

            <div class="main">
                <main>{{ content }}</main>
            </div>
        </section>
    </body>
</html>
