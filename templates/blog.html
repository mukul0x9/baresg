
<ul class="posts">
  {% for post in posts %}
  <li>
      <time class="date">{{ post.formatted_date }}</time>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>

<ul class="alltags">
  {% for tag in tags %}
  <li>
    <a href="/tags/{{ tag.name }}"> #{{ tag.name }} ({{ tag.count }}) </a>

  </li>
  {% endfor %}
</ul>
